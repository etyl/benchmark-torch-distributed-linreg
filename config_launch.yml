objective:
  Linear Regression:
    device: "cuda"

dataset:
  simulated:
    n: [30384]
    d1: [2000]
    d2: [2000]
    iid: ["true"]
    n_blocks: [16]
    noise: [0.1]

solver:
  all-reduce:
    n_workers: [2]
    batch_size: [32, 512, 1024]
    lr: [1e-3]

parallel_config: config_parallel.yml
n_repetitions: 1
timeout: 200