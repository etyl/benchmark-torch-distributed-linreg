objective:
  Linear Regression:
    device: "cuda"

dataset:
  mlp:
    n: [32768]
    d: [4000]
    layers: [1, 4]
    bias: [False]

solver:
  all-reduce:
    global_batch_size: [4096]
    lr: [1e-3]
    slurm_nodes: [2,4,8,16,32]
    slurm_gpus_per_node: [1]
  ddp:
    global_batch_size: [4096]
    lr: [1e-3]
    slurm_nodes: [2,4,8,16,32]
    slurm_gpus_per_node: [1]

parallel_config: config_parallel.yml
n_repetitions: 5
timeout: 100000