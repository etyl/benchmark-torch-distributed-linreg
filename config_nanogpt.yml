objective:
  all-reduce:
    device: "cuda"

dataset:
  nanogpt:
    n_chunks: 4

solver:
  all-reduce:
    local_batch_size: [12]
    lr: [1e-3]
    slurm_nodes: [2,4,8,16,32]
  all-reduce-nolock:
    local_batch_size: [12]
    lr: [1e-3]
    slurm_nodes: [2,4,8,16,32]
  ddp:
    local_batch_size: [12]
    lr: [1e-3]
    slurm_nodes: [2,4,8,16,32]

parallel_config: config_parallel_nanogpt.yml
n_repetitions: 1
timeout: 100000