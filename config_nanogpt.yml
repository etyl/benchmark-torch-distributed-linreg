objective:
  all-reduce:
    device: "cuda"

dataset:
  nanogpt:
    n_chunks: 4

solver:
  all-reduce:
    lr: [1e-3]
    slurm_nodes: [1, 2, 4, 8]
  all-reduce-nolock:
    lr: [1e-3]
    slurm_nodes: [1, 2, 4, 8]
  ddp:
    lr: [1e-3]
    slurm_nodes: [1, 2, 4, 8]

parallel_config: config_parallel_nanogpt.yml
n_repetitions: 5
timeout: 100000