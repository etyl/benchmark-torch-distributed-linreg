objective:
  all-reduce:
    device: "cuda"

dataset:
  nanogpt:
    n_chunks: 4

solver:
  all-reduce:
    local_batch_size: [12]
    lr: [1e-3]
    slurm_gres: ["gpu:2", "gpu:4", "gpu:8", "gpu:16", "gpu:32"]
  all-reduce-nolock:
    local_batch_size: [12]
    lr: [1e-3]
    slurm_gres: ["gpu:2", "gpu:4", "gpu:8", "gpu:16", "gpu:32"]
  ddp:
    local_batch_size: [12]
    lr: [1e-3]
    slurm_gres: ["gpu:2", "gpu:4", "gpu:8", "gpu:16", "gpu:32"]

parallel_config: config_parallel_nanogpt.yml
n_repetitions: 1
timeout: 100000