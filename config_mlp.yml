objective:
  all-reduce:
    device: "cuda"

dataset:
  mlp:
    n: [131072]
    d: [2000, 4000]
    layers: [1, 4]
    bias: [False]

solver:
  all-reduce:
    local_batch_size: [8000]
    lr: [1e-3]
    slurm_gres: ["gpu:2", "gpu:4", "gpu:8", "gpu:16", "gpu:32"]
  all-reduce-nolock:
    local_batch_size: [8000]
    lr: [1e-3]
    slurm_gres: ["gpu:2", "gpu:4", "gpu:8", "gpu:16", "gpu:32"]
  ddp:
    local_batch_size: [8000]
    lr: [1e-3]
    slurm_gres: ["gpu:2", "gpu:4", "gpu:8", "gpu:16", "gpu:32"]

parallel_config: config_parallel.yml
n_repetitions: 5
timeout: 100000