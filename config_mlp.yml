objective:
  Linear Regression:
    device: "cuda"

dataset:
  mlp:
    n: [131072]
    d: [2000, 4000, 8000]
    layers: [1]
    bias: [False]

solver:
  all-reduce:
    local_batch_size: [256, 1024, 4096]
    lr: [1e-3]
    slurm_nodes: [2,4,8]
    slurm_gpus_per_node: [1]
  # ddp:
  #   local_batch_size: [256, 1024, 4096, 8192]
  #   lr: [1e-3]
  #   slurm_nodes: [4]
  #   slurm_gpus_per_node: [1]

parallel_config: config_parallel.yml
n_repetitions: 5
timeout: 100000